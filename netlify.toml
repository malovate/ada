# netlify.toml — Netlify deployment configuration
# ============================================================
# Netlify reads this file to know how to build and serve your app.
#
# WHY Netlify for the webapp?
# - Free tier is genuinely unlimited for personal projects
# - Deploys automatically when you push to GitHub
# - Gives you a URL like: https://ada-paul.netlify.app
# - Handles HTTPS automatically
# - Global CDN — fast from anywhere in the world
# ============================================================

[build]
  # The folder Netlify should look in for your source code.
  base = "webapp"

  # The command Netlify runs to build your app.
  # 'npm run build' runs the 'build' script in package.json,
  # which runs 'vite build' — compiles everything into static files.
  command = "npm run build"

  # The folder Vite outputs the built files to.
  # Netlify serves everything in this folder as your website.
  publish = "dist"

[[redirects]]
  # This rule handles "client-side routing".
  #
  # Our app is a Single Page Application (SPA) — there's only one
  # HTML file (index.html). React handles all navigation in JavaScript.
  #
  # Without this rule: if someone visits /chat directly (or refreshes),
  # Netlify looks for a /chat folder, finds nothing, and returns 404.
  #
  # With this rule: ALL requests that don't match a real file get
  # redirected to index.html, and React handles the rest.
  # 200 means "serve index.html but keep the original URL in the browser".
  from = "/*"
  to = "/index.html"
  status = 200
